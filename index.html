<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Gestão de Projetos</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e1e1e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1082/1082404.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        /* --- ESTILOS BÁSICOS (DARK MODE) --- */
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #121212; color: #e0e0e0; transition: background-color 0.3s; }
        
        .cabecalho-app { margin-bottom: 20px; display: flex; flex-direction: column; gap: 15px; }
        .titulo-e-nav { display: flex; align-items: center; gap: 30px; flex-wrap: wrap; }
        .titulo-e-nav h2 { margin: 0; }
        
        .navegacao-tempo { display: flex; align-items: center; gap: 15px; flex-wrap: wrap;}
        .btn-hoje { background: transparent; color: #e0e0e0; border: 1px solid #777; padding: 6px 20px; border-radius: 20px; cursor: pointer; font-size: 14px; transition: background 0.2s;}
        .btn-hoje:hover { background: #333; }
        .btn-seta { background: transparent; color: #aaa; border: none; padding: 5px; cursor: pointer; font-size: 18px; transition: color 0.2s; display: flex; align-items: center; justify-content: center; font-weight: bold;}
        .btn-seta:hover { color: #fff; }
        .data-atual-texto { font-size: 20px; color: #e0e0e0; margin-left: 10px; }

        .barra-ferramentas { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; justify-content: space-between; }
        .controles { background: #1e1e1e; padding: 10px 15px; border: 1px solid #333; border-radius: 6px; font-size: 14px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap;}
        .controles select { background-color: #333; color: white; border: 1px solid #555; padding: 5px; border-radius: 4px; cursor: pointer; outline: none;}

        .area-import-export { display: flex; gap: 10px; align-items: center; background: #1e1e1e; padding: 8px 15px; border: 1px solid #333; border-radius: 6px; flex-wrap: wrap;}
        .btn-acao { background: #333; color: white; border: 1px solid #555; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold; transition: all 0.2s; display: inline-flex; align-items: center; gap: 5px; text-decoration: none;}
        .btn-acao:hover { background: #444; border-color: #1e90ff; }
        .btn-acao.destaque { background: #0f9d58; border-color: #0f9d58; } 
        .btn-acao.destaque:hover { background: #0b8043; border-color: #0b8043; }
        .btn-reset { background: #600; border-color: #900; }

        /* --- DESIGN DA BARRA DE ROLAGEM --- */
        ::-webkit-scrollbar { width: 12px; height: 12px; }
        ::-webkit-scrollbar-track { background: #1e1e1e; border: 1px solid #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; border: 2px solid #1e1e1e; }
        ::-webkit-scrollbar-thumb:hover { background: #777; }

        /* --- CORES DE STATUS --- */
        .status-P { background-color: #000000; color: #ffffff; border: 1px solid #555; box-sizing: border-box; }
        .status-N { background-color: #777777; color: white; } 
        .status-A { background-color: #1e90ff; color: white; } 
        .status-C { background-color: #00e676; color: black; } 
        .status-B { background-color: #ff4d4d; color: white; } 

        .bg-linha-N { background-color: rgba(119, 119, 119, 0.12) !important; } 
        .bg-linha-A { background-color: rgba(30, 144, 255, 0.12) !important; } 
        .bg-linha-C { background-color: rgba(0, 230, 118, 0.12) !important; } 
        .bg-linha-B { background-color: rgba(255, 77, 77, 0.12) !important; } 

        /* --- ESTRUTURA DO GANTT --- */
        .gantt-container { display: flex; border: 1px solid #3a3a3a; background: #1e1e1e; height: 75vh; overflow: hidden; }
        
        .gantt-dados { 
            min-width: 850px; max-width: 850px; border-right: 2px solid #555; background-color: #1e1e1e; 
            overflow-y: auto; overflow-x: hidden; flex-shrink: 0; scrollbar-width: none; 
        }
        .gantt-dados::-webkit-scrollbar { display: none; } 

        .linha-dados { display: flex; border-bottom: 1px solid #3a3a3a; align-items: center; font-size: 14px; height: 40px; box-sizing: border-box; }
        .linha-dados.projeto { background-color: #000000; color: #ffffff; font-weight: bold; text-transform: uppercase; border-top: 1px solid #444; border-bottom: 1px solid #444; }
        .linha-dados.cabecalho-tabela { 
            background-color: #2c2c2c; font-weight: bold; height: 170px; border-bottom: 2px solid #555; 
            color: #fff; align-items: flex-end; padding-bottom: 8px; position: sticky; top: 0; z-index: 20; 
        }

        .editavel { cursor: text; outline: none; padding: 5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; box-sizing: border-box;}

        .col-acoes { width: 50px; display: flex; justify-content: center; align-items: center; gap: 6px; flex-shrink: 0; }
        .btn-add, .btn-del { border: none; border-radius: 50%; width: 18px; height: 18px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; color: white; opacity: 0.3;}
        .linha-dados:hover .btn-add, .linha-dados:hover .btn-del { opacity: 1; }
        .btn-add { background-color: #28a745; }
        .btn-del { background-color: #dc3545; }
        
        .col-status { width: 85px; text-align: center; flex-shrink: 0; font-size: 10px; } 
        .col-nome { flex-grow: 1; min-width: 170px; max-width: 300px; padding-left: 10px;}
        .col-data-inicio { width: 160px; text-align: center; flex-shrink: 0; padding: 0 5px; box-sizing: border-box;}
        .col-data { width: 115px; text-align: center; flex-shrink: 0; display: flex; justify-content: center; }
        .col-duracao { width: 40px; text-align: center; flex-shrink: 0; font-size: 11px; color: #888; } 
        .col-resp { width: 140px; padding-left: 10px; flex-shrink: 0; }

        select.col-status { height: 25px; border: 1px solid #555; border-radius: 4px; color: white; font-weight: bold; cursor: pointer; appearance: none; text-align: center; }
        .input-data { background: transparent; color: #e0e0e0; border: 1px solid transparent; border-radius: 4px; padding: 2px 5px; width: 100%; box-sizing: border-box; text-align: center;}
        .input-data.projeto-data { color: #ffffff; font-weight: bold; pointer-events: none; }
        .btn-abrir-modal { cursor: pointer; color: #58a6ff; font-weight: bold; }
        
        /* --- MODAIS --- */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
        .modal-box { background: #1e1e1e; border: 1px solid #444; border-radius: 12px; width: 90%; max-width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); display: flex; flex-direction: column; overflow: hidden; }
        .modal-header { padding: 15px; font-weight: bold; text-align: center; font-size: 14px; color: #ccc; border-bottom: 1px solid #333; position: relative;}
        .btn-fechar-modal { position: absolute; right: 15px; top: 12px; background: transparent; border: none; color: #aaa; font-size: 18px; cursor: pointer; }
        .modal-content { padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .switch-container { display: flex; width: 100%; background: #000; border-radius: 20px; overflow: hidden; border: 1px solid #444; margin-bottom: 20px;}
        .switch-btn { flex: 1; background: transparent; border: none; padding: 10px 0; font-size: 16px; cursor: pointer; color: #555; }
        .switch-btn.active { background: #1e90ff; color: white; }
        
        .input-data-grande { background: #333; border: 1px solid #555; color: white; font-size: 14px; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; text-align: center; margin-bottom: 10px; }
        .instrucao-link { font-size: 13px; color: #58a6ff; text-align: center; display: none; }

        body.selecionando-link .modal-overlay { background: rgba(0,0,0,0.2); pointer-events: none; } 
        body.selecionando-link .modal-box { pointer-events: auto; opacity: 0.9; transform: translateY(-50px); border-color: #1e90ff; } 

        /* --- CRONOGRAMA --- */
        .gantt-cronograma { flex-grow: 1; display: grid; position: relative; overflow: auto; }
        .linha-cabecalho { grid-column: 1 / -1; display: grid; grid-template-columns: subgrid; }
        .celula-cabecalho { border-right: 1px solid #3a3a3a; border-bottom: 1px solid #3a3a3a; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; box-sizing: border-box; }
        .meses { position: sticky; top: 0px; z-index: 20; background: #111; height: 30px;}
        .dias { position: sticky; top: 30px; z-index: 20; background: #222; height: 30px;}
        
        .fundo-grade-excel { grid-column: 1 / -1; display: grid; grid-template-columns: subgrid; pointer-events: none; z-index: 0; }
        .linha-grade-vertical { border-right: 1px solid #3a3a3a; }
        .linha-cronograma { grid-column: 1 / -1; display: grid; grid-template-columns: subgrid; border-bottom: 1px solid #3a3a3a; align-items: center; height: 40px; z-index: 1;}
        .barra-etapa { height: 22px; border-radius: 4px; box-shadow: 1px 1px 4px rgba(0,0,0,0.5); z-index: 2; position: relative; }
        .linha-cronograma.projeto .barra-etapa { height: 10px; }
    </style>
</head>
<body>

    <div class="cabecalho-app">
        <div class="titulo-e-nav">
            <h2>Gestão de Projetos</h2>
            <div class="navegacao-tempo">
                <button class="btn-hoje" onclick="irParaHoje()">Hoje</button>
                <button class="btn-seta" onclick="moverMes(-1)">&#10094;</button>
                <button class="btn-seta" onclick="moverMes(1)">&#10095;</button>
                <span class="data-atual-texto" id="textoDataAtual"></span>
            </div>
        </div>

        <div class="barra-ferramentas">
            <div class="controles">
                <select id="filtroMesIni" onchange="atualizarPeriodoGrafico()">
                    <option value="1">Jan</option><option value="2">Fev</option><option value="3" selected>Mar</option>
                    <option value="4">Abr</option><option value="5">Mai</option><option value="6">Jun</option>
                    <option value="7">Jul</option><option value="8">Ago</option><option value="9">Set</option>
                    <option value="10">Out</option><option value="11">Nov</option><option value="12">Dez</option>
                </select>
                <select id="filtroAnoIni" onchange="atualizarPeriodoGrafico()">
                    <option value="2026" selected>2026</option><option value="2027">2027</option>
                </select>
                <span>até</span>
                <select id="filtroMesFim" onchange="atualizarPeriodoGrafico()">
                    <option value="12" selected>Dez</option>
                </select>
                <select id="filtroAnoFim" onchange="atualizarPeriodoGrafico()">
                    <option value="2026" selected>2026</option><option value="2027">2027</option>
                </select>
            </div>

            <div class="area-import-export">
                <button onclick="baixarModeloGabarito()" class="btn-acao destaque">📥 Exportar</button>
                <label for="uploadExcel" class="btn-acao">📤 Importar</label>
                <input type="file" id="uploadExcel" accept=".xlsx, .xls" style="display: none;" onchange="importarDeExcel(event)">
                <button onclick="limparTudo()" class="btn-acao btn-reset">🗑️ Limpar Tudo</button>
            </div>
        </div>
    </div>

    <div class="gantt-container">
        <div class="gantt-dados" id="areaDados"></div>
        <div class="gantt-cronograma" id="areaCronograma">
            <div id="cabecalhoTempo" style="display: contents;"></div>
            <div id="barrasTempo" style="display: contents;"></div>
        </div>
    </div>

    <div id="modalInicioOverlay" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">Definir Início <button class="btn-fechar-modal" onclick="fecharModalInicio()">×</button></div>
            <div class="modal-content">
                <div class="switch-container">
                    <button id="btnSwitchPencil" class="switch-btn active" onclick="alternarModoModal('manual')">✏️</button>
                    <button id="btnSwitchLink" class="switch-btn" onclick="alternarModoModal('link')">🔗</button>
                </div>
                <input type="date" id="modalInputData" class="input-data-grande">
                <div id="modalInstrucaoLink" class="instrucao-link">Clique em uma tarefa na tabela para vincular.</div>
                <button class="btn-acao destaque" style="width: 100%; margin-top: 15px; padding: 10px;" onclick="salvarModal()">Salvar</button>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURAÇÃO DE TEMPO ---
        let DATA_INICIO_GRAFICO = new Date(2026, 0, 1);
        let DATA_FIM_GRAFICO = new Date(2026, 11, 31);
        let totalDiasAno = 365;

        // --- DADOS (LOCALSTORAGE) ---
        let etapas = [];
        const ETAPAS_EXEMPLO = [
            { id: 1, status: 'P', nome: 'PROJETO EXEMPLO', inicio: '2026-03-01', fim: '2026-03-15', responsavel: '', dependencia: '', modoInicio: 'manual' },
            { id: 2, status: 'A', nome: 'Minha primeira tarefa', inicio: '2026-03-01', fim: '2026-03-05', responsavel: 'Eu', dependencia: '', modoInicio: 'manual' }
        ];

        function salvarDados() { localStorage.setItem('gantt_etapas_data', JSON.stringify(etapas)); }
        function carregarDados() {
            const salvos = localStorage.getItem('gantt_etapas_data');
            etapas = salvos ? JSON.parse(salvos) : [...ETAPAS_EXEMPLO];
        }
        function limparTudo() {
            if(confirm("Deseja apagar todos os dados permanentemente?")) {
                localStorage.removeItem('gantt_etapas_data'); location.reload();
            }
        }

        // --- LÓGICA DE NEGÓCIO ---
        function calcularDatasProjetos() {
            let projetoAtual = null, range = { min: null, max: null };
            etapas.forEach(e => {
                if (e.status === 'P') {
                    if (projetoAtual) {
                        projetoAtual.inicio = range.min ? formataData(range.min) : projetoAtual.inicio;
                        projetoAtual.fim = range.max ? formataData(range.max) : projetoAtual.fim;
                    }
                    projetoAtual = e; range = { min: null, max: null };
                } else if (projetoAtual && e.inicio && e.fim) {
                    let dI = new Date(e.inicio + 'T12:00:00'), dF = new Date(e.fim + 'T12:00:00');
                    if (!range.min || dI < range.min) range.min = dI;
                    if (!range.max || dF > range.max) range.max = dF;
                }
            });
            if (projetoAtual) {
                projetoAtual.inicio = range.min ? formataData(range.min) : projetoAtual.inicio;
                projetoAtual.fim = range.max ? formataData(range.max) : projetoAtual.fim;
            }
        }

        function recalcularDependencias() {
            for(let i=0; i<5; i++) {
                etapas.forEach(e => {
                    if (e.modoInicio === 'link' && e.dependencia) {
                        const pai = etapas.find(p => p.id == e.dependencia);
                        if (pai && pai.fim) {
                            let dPai = new Date(pai.fim + 'T12:00:00');
                            dPai.setDate(dPai.getDate() + 1);
                            let novoIni = formataData(dPai);
                            if (e.inicio !== novoIni) {
                                let dur = (e.inicio && e.fim) ? Math.round((new Date(e.fim+'T12:00:00') - new Date(e.inicio+'T12:00:00'))/(1000*3600*24)) : 0;
                                e.inicio = novoIni;
                                if(dur > 0) {
                                    let dFim = new Date(novoIni+'T12:00:00'); dFim.setDate(dFim.getDate()+dur);
                                    e.fim = formataData(dFim);
                                }
                            }
                        }
                    }
                });
            }
        }

        // --- EXPORTAÇÃO E IMPORTAÇÃO ---
        function baixarModeloGabarito() {
            const worksheet = XLSX.utils.json_to_sheet(etapas);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Cronograma");
            XLSX.writeFile(workbook, "Gabarito_Projetos.xlsx");
        }

        function importarDeExcel(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const workbook = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                    const jsonDados = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                    if(jsonDados.length > 0) {
                        etapas = jsonDados; 
                        recalcularDependencias(); calcularDatasProjetos(); desenharEtapas();
                        alert("Importado com sucesso!");
                    }
                } catch (erro) { alert("Erro ao ler planilha."); }
            };
            reader.readAsArrayBuffer(file);
            event.target.value = '';
        }

        // ==========================================
        //  PONTO 3: OTIMIZAÇÃO DE RENDERIZAÇÃO
        // ==========================================
        function desenharEtapas() {
            // Em vez de alterar a tela dezenas de vezes, construímos a estrutura como texto (String Building).
            let htmlDados = `<div class="linha-dados cabecalho-tabela"><div class="col-acoes"></div><div class="col-status">STATUS</div><div class="col-nome">ATIVIDADE</div><div class="col-data-inicio">INÍCIO</div><div class="col-data">FIM</div><div class="col-duracao">D</div><div class="col-resp">RESP</div></div>`;
            let htmlCronograma = ''; 
            let row = 3;

            etapas.forEach(e => {
                const isP = e.status === 'P';
                let dur = (e.inicio && e.fim) ? Math.round((new Date(e.fim+'T12:00:00')-new Date(e.inicio+'T12:00:00'))/(1000*3600*24))+'d' : '-';

                // Acumulando as linhas na memória
                htmlDados += `
                    <div class="linha-dados ${isP?'projeto':''} bg-linha-${e.status}" onclick="if(document.body.classList.contains('selecionando-link')) vincularTarefa(${e.id})">
                        <div class="col-acoes"><button class="btn-add" onclick="adicionarEtapa(${e.id})">+</button><button class="btn-del" onclick="removerEtapa(${e.id})">x</button></div>
                        <select class="col-status status-${e.status}" onchange="atualizarCampo(${e.id},'status',this.value)"><option value="P" ${e.status==='P'?'selected':''}>PROJ</option><option value="A" ${e.status==='A'?'selected':''}>AND</option><option value="N" ${e.status==='N'?'selected':''}>NÃO</option><option value="C" ${e.status==='C'?'selected':''}>CONC</option></select>
                        <div class="col-nome editavel" contenteditable="true" onblur="atualizarCampo(${e.id},'nome',this.innerText)">${e.nome}</div>
                        <div class="col-data-inicio"><div class="input-data btn-abrir-modal" onclick="abrirModalInicio(${e.id})">${e.inicio||'Definir'} ${e.dependencia?'🔗':''}</div></div>
                        <div class="col-data"><input type="date" class="input-data ${isP?'projeto-data':''}" value="${e.fim||''}" onchange="atualizarCampo(${e.id},'fim',this.value)"></div>
                        <div class="col-duracao">${dur}</div>
                        <div class="col-resp editavel" contenteditable="true" onblur="atualizarCampo(${e.id},'responsavel',this.innerText)">${e.responsavel}</div>
                    </div>`;

                if(e.inicio && e.fim) {
                    let colI = Math.floor((new Date(e.inicio+'T12:00:00')-DATA_INICIO_GRAFICO)/(1000*3600*24))+1;
                    let colF = Math.floor((new Date(e.fim+'T12:00:00')-DATA_INICIO_GRAFICO)/(1000*3600*24))+2;
                    if(colF > colI) {
                        htmlCronograma += `<div class="linha-cronograma ${isP?'projeto':''}" style="grid-row:${row};"><div class="barra-etapa status-${e.status}" style="grid-column:${colI}/${colF};"></div></div>`;
                    } else htmlCronograma += `<div class="linha-cronograma" style="grid-row:${row};"></div>`;
                } else {
                    htmlCronograma += `<div class="linha-cronograma" style="grid-row:${row};"></div>`;
                }
                row++;
            });

            // Colamos tudo na tela de uma vez só! (Performance brutalmente maior)
            document.getElementById('areaDados').innerHTML = htmlDados;
            document.getElementById('barrasTempo').innerHTML = htmlCronograma;
            
            salvarDados(); 
        }

        // --- AUXILIARES ---
        function formataData(d) { return d.toISOString().split('T')[0]; }
        function atualizarCampo(id, campo, valor) { 
            let e = etapas.find(x => x.id === id); 
            e[campo] = valor; 
            if(campo==='inicio' || campo==='fim') { recalcularDependencias(); calcularDatasProjetos(); }
            desenharEtapas(); 
        }
        function adicionarEtapa(id) { 
            etapas.splice(etapas.findIndex(x=>x.id===id)+1, 0, { id: Date.now(), status: 'N', nome: 'Nova Tarefa', inicio: '', fim: '', responsavel: '', modoInicio: 'manual' }); 
            desenharEtapas(); 
        }
        function removerEtapa(id) { etapas = etapas.filter(x=>x.id!==id); desenharEtapas(); }

        // --- MODAL LÓGICA ---
        let modalId = null;
        function abrirModalInicio(id) { modalId = id; document.getElementById('modalInicioOverlay').style.display='flex'; alternarModoModal('manual'); }
        function fecharModalInicio() { document.getElementById('modalInicioOverlay').style.display='none'; document.body.classList.remove('selecionando-link'); }
        function alternarModoModal(m) {
            document.querySelectorAll('.switch-btn').forEach(b=>b.classList.remove('active'));
            document.getElementById(m==='manual'?'btnSwitchPencil':'btnSwitchLink').classList.add('active');
            document.getElementById('modalInputData').style.display = m==='manual'?'block':'none';
            document.getElementById('modalInstrucaoLink').style.display = m==='link'?'block':'none';
            if(m==='link') document.body.classList.add('selecionando-link'); else document.body.classList.remove('selecionando-link');
        }
        function salvarModal() {
            let e = etapas.find(x=>x.id===modalId);
            e.modoInicio = 'manual'; e.inicio = document.getElementById('modalInputData').value; e.dependencia = '';
            fecharModalInicio(); recalcularDependencias(); calcularDatasProjetos(); desenharEtapas();
        }
        function vincularTarefa(paiId) {
            if(paiId === modalId) return;
            let e = etapas.find(x=>x.id===modalId);
            e.modoInicio = 'link'; e.dependencia = paiId;
            fecharModalInicio(); recalcularDependencias(); calcularDatasProjetos(); desenharEtapas();
        }

        // --- LÓGICA DE CALENDÁRIO ---
        function atualizarPeriodoGrafico() {
            const mi = parseInt(document.getElementById('filtroMesIni').value), ai = parseInt(document.getElementById('filtroAnoIni').value);
            const mf = parseInt(document.getElementById('filtroMesFim').value), af = parseInt(document.getElementById('filtroAnoFim').value);
            DATA_INICIO_GRAFICO = new Date(ai, mi-1, 1); DATA_FIM_GRAFICO = new Date(af, mf, 0);
            totalDiasAno = Math.round((DATA_FIM_GRAFICO - DATA_INICIO_GRAFICO)/(1000*3600*24))+1;
            desenharCabecalho(); desenharEtapas();
        }

        function desenharCabecalho() {
            const cro = document.getElementById('areaCronograma'); cro.style.gridTemplateColumns = `repeat(${totalDiasAno}, minmax(25px, 1fr))`;
            let hM = '', hD = '', fds = '';
            // Construção na memória primeiro (Performance!)
            for(let i=0; i<totalDiasAno; i++) {
                let d = new Date(DATA_INICIO_GRAFICO.getTime() + i*24*60*60*1000);
                hD += `<div class="celula-cabecalho" style="grid-column:${i+1};">${d.getDate()}</div>`;
                fds += `<div class="linha-grade-vertical" style="grid-column:${i+1};"></div>`;
            }
            document.getElementById('cabecalhoTempo').innerHTML = `<div class="linha-cabecalho meses">${hM}</div><div class="linha-cabecalho dias">${hD}</div><div class="fundo-grade-excel" style="grid-row:3/999;">${fds}</div>`;
        }

        window.onload = () => { 
            carregarDados(); atualizarPeriodoGrafico(); 
            document.getElementById('textoDataAtual').innerText = new Date().toLocaleDateString(); 

            // Scroll Suave (Performance na navegação)
            const aC = document.getElementById('areaCronograma'); 
            const aD = document.getElementById('areaDados');
            let isSyncingLeft = false;
            let isSyncingRight = false;
            
            aD.addEventListener('scroll', function(e) {
                if (!isSyncingLeft) {
                    isSyncingRight = true;
                    aC.scrollTop = this.scrollTop;
                }
                isSyncingLeft = false;
            });
            aC.addEventListener('scroll', function(e) {
                if (!isSyncingRight) {
                    isSyncingLeft = true;
                    aD.scrollTop = this.scrollTop;
                }
                isSyncingRight = false;
            });
        };
        
        function moverMes(v) { document.getElementById('areaCronograma').scrollBy({left: v*300, behavior:'smooth'}); }
        function irParaHoje() { /* Navegação futura */ }
    </script>
</body>
</html>
